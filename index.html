<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>Homepage</title>

  <!-- Simple inline favicon so the browser doesn't request a missing file -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%233fb8af'/%3E%3Ctext x='8' y='12' font-size='10' font-family='sans-serif' font-weight='bold' text-anchor='middle' fill='%2306201d'%3EH%3C/text%3E%3C/svg%3E" />

  <!-- config.js MUST load before script.js: both read homepageConfig -->
  <script src="config.js"></script>
  <script>
    // Apply the saved (or configured) theme before the first paint so the
    // page never flashes the wrong theme while loading.
    (function () {
      var theme = null;
      try { theme = localStorage.getItem("homepage.theme"); } catch (e) { /* storage unavailable */ }
      if (theme !== "light" && theme !== "dark") {
        var cfg = typeof homepageConfig !== "undefined" ? homepageConfig : null;
        theme = cfg && cfg.theme && cfg.theme.default === "light" ? "light" : "dark";
      }
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
</head>
<body>

  <a class="skip-link" href="#main-content">Skip to main content</a>

  <div class="page">

    <!-- ============================= HEADER ============================= -->
    <header class="site-header">
      <div class="greeting-block">
        <h1 id="greeting" class="greeting-text">Hello</h1>
        <p id="date" class="date-text"></p>
      </div>

      <div class="header-right">
        <p id="clock" class="clock-text">--:--:--</p>
        <button
          id="theme-toggle"
          class="btn"
          type="button"
        >
          <span id="theme-toggle-label">Dark mode</span>
        </button>
      </div>
    </header>

    <main id="main-content" class="page-main">

      <!-- ============================= SEARCH ============================= -->
      <!-- The form's action, query parameter, and placeholder are set by
           script.js from config.js, so they only need editing in one place. -->
      <section id="search-section" class="search-section" aria-label="Web search">
        <form id="search-form" class="search-form" role="search">
          <label for="search-input" class="visually-hidden">Search the web</label>
          <input
            id="search-input"
            name="q"
            type="search"
            class="search-input"
            placeholder="Search the web"
            autocomplete="off"
          />
          <button type="submit" class="btn btn-primary search-submit">Search</button>
        </form>
      </section>

      <!-- ========================= SHORTCUT GROUPS ========================= -->
      <section id="shortcuts-section" class="shortcuts-section" aria-labelledby="shortcuts-heading">
        <h2 id="shortcuts-heading" class="visually-hidden">Shortcut groups</h2>
        <div id="shortcut-groups" class="shortcut-groups">
          <!-- Shortcut group cards are rendered here by script.js from config.js -->
        </div>
      </section>

      <!-- ============================== NOTES ============================== -->
      <section id="notes-section" class="notes-section" aria-labelledby="notes-heading">
        <div class="notes-card">
          <div class="notes-header">
            <h2 id="notes-heading" class="notes-heading">Today's focus</h2>
            <button id="notes-clear" class="btn btn-ghost" type="button">Clear</button>
          </div>
          <label for="notes-textarea" class="visually-hidden">Today's focus notes</label>
          <textarea
            id="notes-textarea"
            class="notes-textarea"
            placeholder="What matters most today?"
            rows="6"
          ></textarea>
          <p id="notes-status" class="notes-status" aria-live="polite"></p>
        </div>
      </section>

    </main>

    <footer class="site-footer">
      <p>Personal homepage &mdash; everything on this page stays in your browser.</p>
    </footer>

  </div>

</body>
</html>
